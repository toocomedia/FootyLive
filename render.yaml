services:
  - type: web
    name: footy-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: API_KEY
        sync: false
      - key: CACHE_TTL_SECONDS
        value: "20"
      - key: REQUEST_TIMEOUT_SECONDS
        value: "10"
      - key: LOG_LEVEL
        value: "INFO"
